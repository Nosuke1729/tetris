<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Battle Tetris Web</title>
  <script type="module" crossorigin src="/tetris/assets/index-DkdFoO5z.js"></script>
  <link rel="stylesheet" crossorigin href="/tetris/assets/index-E8wGOkOw.css">
</head>
<body>

<!-- ============================================================
     タイトル画面
============================================================ -->
<div id="screen-title" class="screen">
  <div class="title-wrapper">
    <h1 class="game-title">BATTLE<br><span>TETRIS</span></h1>

    <div class="title-form">
      <label>プレイヤー名
        <input id="input-name" type="text" placeholder="Player" maxlength="16" />
      </label>

      <div class="btn-group">
        <button id="btn-single" class="btn btn-primary">▶ シングルプレイ</button>
        <button id="btn-battle" class="btn btn-secondary">⚔ 対戦</button>
      </div>
    </div>

    <div class="controls-help">
      <h3>操作説明</h3>
      <table class="keytable">
        <tr><td>← →</td><td>左右移動</td></tr>
        <tr><td>↓</td><td>ソフトドロップ</td></tr>
        <tr><td>Space</td><td>ハードドロップ</td></tr>
        <tr><td>↑ / X</td><td>右回転</td></tr>
        <tr><td>Z</td><td>左回転</td></tr>
        <tr><td>C</td><td>ホールド</td></tr>
        <tr><td>P</td><td>ポーズ</td></tr>
        <tr><td>Esc</td><td>退出</td></tr>
      </table>
    </div>

    <div id="ws-status" class="ws-status">● オフライン</div>
  </div>
</div>

<!-- ============================================================
     シングルプレイ モード選択
============================================================ -->
<div id="screen-mode" class="screen" style="display:none">
  <div class="title-wrapper">
    <h2 class="mode-title">SINGLE PLAY</h2>

    <div class="btn-group">
      <button id="btn-normal" class="btn btn-primary">ノーマルプレイ</button>
      <button id="btn-practice" class="btn btn-secondary">プラクティス</button>
    </div>

    <button id="btn-back-title-mode" class="btn btn-outline">← 戻る</button>
  </div>
</div>

<!-- ============================================================
     プラクティスメニュー
============================================================ -->
<div id="screen-practice" class="screen" style="display:none">
  <div class="practice-wrapper">
    <h2>プラクティス</h2>

    <div class="practice-categories">
      <section class="practice-section">
        <h3>Openers</h3>
        <div class="btn-group practice-grid">
          <button class="btn btn-primary practice-item" data-practice="dt_cannon">DT砲</button>
          <button class="btn btn-primary practice-item" data-practice="hachimitsu">ハチミツ砲</button>
          <button class="btn btn-primary practice-item" data-practice="tki">TKI</button>
          <button class="btn btn-primary practice-item" data-practice="pc1">Perfect Clear</button>
        </div>
      </section>

      <section class="practice-section">
        <h3>T-Spin</h3>
        <div class="btn-group practice-grid">
          <button class="btn btn-secondary practice-item" data-practice="tsd">T-Spin Double</button>
          <button class="btn btn-secondary practice-item" data-practice="tst">T-Spin Triple</button>
          <button class="btn btn-secondary practice-item" data-practice="tss">T-Spin Single</button>
          <button class="btn btn-secondary practice-item" data-practice="mini_tspin">Mini T-Spin</button>
        </div>
      </section>

      <section class="practice-section">
        <h3>Stacking</h3>
        <div class="btn-group practice-grid">
          <button class="btn btn-outline practice-item" data-practice="mountain">山岳積み</button>
          <button class="btn btn-outline practice-item" data-practice="lst">LST stacking</button>
          <button class="btn btn-outline practice-item" data-practice="six_three">6-3 stacking</button>
        </div>
      </section>

      <section class="practice-section">
        <h3>Battle / Utility</h3>
        <div class="btn-group practice-grid">
          <button class="btn btn-outline practice-item" data-practice="cheese_race">Cheese Race</button>
          <button class="btn btn-outline practice-item" data-practice="combo_basic">Combo 基礎</button>
          <button class="btn btn-outline practice-item" data-practice="b2b_keep">B2B 維持</button>
        </div>
      </section>
    </div>

    <button id="btn-back-mode" class="btn btn-outline">← 戻る</button>
  </div>
</div>

<!-- ============================================================
     ルーム画面
============================================================ -->
<div id="screen-room" class="screen" style="display:none">
  <div class="room-wrapper">
    <h2>対戦ルーム</h2>

    <div class="room-actions">
      <button id="btn-create-room" class="btn btn-primary">部屋を作成</button>
      <div class="join-row">
        <input id="input-room-id" type="text" placeholder="部屋ID" maxlength="8" />
        <button id="btn-join-room" class="btn btn-secondary">参加</button>
      </div>
    </div>

    <div id="room-info" style="display:none">
      <div class="room-id-box">
        部屋ID: <strong id="room-id-display"></strong>
        <button id="btn-copy-room" class="btn btn-small">コピー</button>
      </div>
      <div id="player-list" class="player-list"></div>
      <div id="room-status" class="room-status"></div>
      <div class="room-btns">
        <button id="btn-ready" class="btn btn-primary" style="display:none">準備完了</button>
        <button id="btn-start" class="btn btn-primary" style="display:none">ゲーム開始</button>
      </div>
    </div>

    <div class="room-status" id="room-status-fallback"></div>
    <button id="btn-back-title" class="btn btn-outline">← 戻る</button>
  </div>
</div>

<!-- ============================================================
     ゲーム画面
============================================================ -->
<div id="screen-game" class="screen" style="display:none">
  <div class="game-wrapper">
    <div class="game-topbar">
      <button id="btn-pause" class="btn btn-small">一時停止</button>
      <button id="btn-exit-game" class="btn btn-small btn-danger">退出</button>
    </div>
    <div class="canvas-container">
      <canvas id="game-canvas"></canvas>
      <div id="countdown-overlay" class="countdown-overlay" style="display:none"></div>
    </div>
    <div id="opponent-area" style="display:none"></div>
  </div>
</div>

<!-- ============================================================
     結果画面
============================================================ -->
<div id="screen-result" class="screen" style="display:none">
  <div class="result-wrapper">
    <h2 id="result-label" class="result-label">GAME OVER</h2>
    <div class="result-stats">
      <p id="result-score"></p>
      <p id="result-lines"></p>
      <p id="result-level"></p>
    </div>
    <div class="result-btns">
      <button id="btn-rematch" class="btn btn-primary" style="display:none">再戦</button>
      <button id="btn-play-again" class="btn btn-primary">もう一度</button>
      <button id="btn-back-title2" class="btn btn-outline">タイトルへ</button>
    </div>
  </div>
</div>

</body>
</html>
